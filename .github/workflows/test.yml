name: test

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2

    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v2
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.26'

      - run: just go test -race ./...
